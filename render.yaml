services:
  - type: web
    name: color-platform-api
    env: python
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        scope: build,runtime
        sync: false
      - key: FRONTEND_URL
        scope: build,runtime
        sync: false
        value: https://glowing-faun-704609.netlify.app
      - key: PORT
        scope: build,runtime
        sync: false
        value: 8000
